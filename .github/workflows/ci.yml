name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ['1.23', '1.24', '1.25']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Check formatting
        run: gofmt -l .

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o /dev/null ./cmd/conductor
        if: runner.os != 'windows'
      - name: Build (Windows)
        run: go build -o nul ./cmd/conductor
        if: runner.os == 'windows'

      - name: Unit tests
        run: go test -short -count=1 ./...

      - name: Snapshot tests
        run: go test -v -run TestSnapshot ./internal/tests/...

      - name: Integration tests
        run: go test -v -run TestIntegration ./internal/tests/...

      - name: Soak test (short)
        if: matrix.go == '1.25' && matrix.os == 'ubuntu-latest'
        run: go test -run TestSoakShort -timeout 10m -v ./internal/tests/