name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run tests
        run: go test -short -count=1 ./...

      - name: Build release binaries
        run: |
          mkdir -p dist
          GOOS=darwin GOARCH=arm64 go build -ldflags "-X main.version=${{ github.ref_name }}" -o dist/conductor-darwin-arm64 ./cmd/conductor
          GOOS=darwin GOARCH=amd64 go build -ldflags "-X main.version=${{ github.ref_name }}" -o dist/conductor-darwin-amd64 ./cmd/conductor
          GOOS=linux GOARCH=arm64 go build -ldflags "-X main.version=${{ github.ref_name }}" -o dist/conductor-linux-arm64 ./cmd/conductor
          GOOS=linux GOARCH=amd64 go build -ldflags "-X main.version=${{ github.ref_name }}" -o dist/conductor-linux-amd64 ./cmd/conductor
          GOOS=windows GOARCH=amd64 go build -ldflags "-X main.version=${{ github.ref_name }}" -o dist/conductor-windows-amd64.exe ./cmd/conductor

      - name: Create release archive
        run: |
          cd dist
          for f in conductor-*; do
            ext=""
            case "$f" in
              *.exe) ext=".exe" ;;
            esac
            mv "$f" "conductor${ext}"
            tar czf "../$f.tar.gz" "conductor${ext}"
          done
          cd ..

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz > checksums.txt
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          generate_release_notes: true